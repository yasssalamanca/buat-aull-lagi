<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="starGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Stars of various sizes -->
  <g fill="#FFFFFF">
    <!-- Big stars -->
    <circle cx="30" cy="25" r="2.5" opacity="0.95"/>
    <circle cx="200" cy="15" r="2" opacity="0.9"/>
    <circle cx="370" cy="40" r="2.5" opacity="0.85"/>
    <circle cx="100" cy="60" r="2" opacity="0.9"/>
    <circle cx="320" cy="80" r="2.5" opacity="0.8"/>
    <!-- Medium stars -->
    <circle cx="60" cy="100" r="1.5" opacity="0.8"/>
    <circle cx="150" cy="45" r="1.5" opacity="0.85"/>
    <circle cx="250" cy="70" r="1.5" opacity="0.75"/>
    <circle cx="340" cy="20" r="1.5" opacity="0.9"/>
    <circle cx="80" cy="140" r="1.5" opacity="0.7"/>
    <circle cx="220" cy="110" r="1.5" opacity="0.8"/>
    <circle cx="390" cy="130" r="1.5" opacity="0.75"/>
    <circle cx="170" cy="160" r="1.5" opacity="0.65"/>
    <circle cx="300" cy="150" r="1.5" opacity="0.8"/>
    <!-- Small stars -->
    <circle cx="45" cy="55" r="1" opacity="0.7"/>
    <circle cx="120" cy="30" r="1" opacity="0.75"/>
    <circle cx="280" cy="35" r="1" opacity="0.65"/>
    <circle cx="180" cy="90" r="1" opacity="0.7"/>
    <circle cx="350" cy="100" r="1" opacity="0.6"/>
    <circle cx="15" cy="80" r="1" opacity="0.7"/>
    <circle cx="260" cy="130" r="1" opacity="0.65"/>
    <circle cx="380" cy="60" r="1" opacity="0.7"/>
    <circle cx="130" cy="170" r="1" opacity="0.6"/>
    <circle cx="240" cy="185" r="1" opacity="0.55"/>
    <circle cx="50" cy="190" r="1" opacity="0.6"/>
    <circle cx="360" cy="170" r="1" opacity="0.65"/>
    <!-- Tiny twinkling dots -->
    <circle cx="90" cy="20" r="0.7" opacity="0.55"/>
    <circle cx="190" cy="50" r="0.7" opacity="0.5"/>
    <circle cx="310" cy="45" r="0.7" opacity="0.6"/>
    <circle cx="140" cy="110" r="0.7" opacity="0.5"/>
    <circle cx="400" cy="90" r="0.7" opacity="0.55"/>
    <circle cx="20" cy="150" r="0.7" opacity="0.5"/>
    <circle cx="290" cy="190" r="0.7" opacity="0.45"/>
    <circle cx="380" cy="200" r="0.7" opacity="0.5"/>
    <!-- Cross-shaped bright star -->
    <g opacity="0.95" transform="translate(340,50)">
      <ellipse cx="0" cy="0" rx="6" ry="1.5" fill="white" opacity="0.8"/>
      <ellipse cx="0" cy="0" rx="1.5" ry="6" fill="white" opacity="0.8"/>
      <circle cx="0" cy="0" r="2" fill="white"/>
    </g>
    <g opacity="0.85" transform="translate(70,35)">
      <ellipse cx="0" cy="0" rx="5" ry="1.2" fill="white" opacity="0.7"/>
      <ellipse cx="0" cy="0" rx="1.2" ry="5" fill="white" opacity="0.7"/>
      <circle cx="0" cy="0" r="1.5" fill="white"/>
    </g>
