<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="moonGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FEFCE8" stop-opacity="1"/>
      <stop offset="60%" stop-color="#E8E4C8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C8C4A0" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B8D4F0" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#8AB4D8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6090B8" stop-opacity="0"/>
    </radialGradient>
    <filter id="moonBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Outer soft glow -->
  <circle cx="105" cy="100" r="85" fill="url(#moonGlow)" filter="url(#moonBlur)"/>
  <!-- Moon crescent shape -->
  <path d="M120 35 A65 65 0 1 0 120 165 A50 50 0 1 1 120 35 Z" fill="url(#moonGrad)"/>
  <!-- Craters -->
  <circle cx="80" cy="90" r="7" fill="#D4D0A8" opacity="0.5"/>
  <circle cx="100" cy="130" r="5" fill="#D4D0A8" opacity="0.4"/>
  <circle cx="65" cy="115" r="4" fill="#D4D0A8" opacity="0.35"/>
  <!-- Small stars around moon -->
  <g fill="#E8F4FF" opacity="0.8">
    <polygon points="155,50 157,56 163,56 158,60 160,66 155,62 150,66 152,60 147,56 153,56" transform="scale(0.6) translate(95,30)"/>
    <circle cx="168" cy="75" r="2.5"/>
    <circle cx="145" cy="55" r="1.5"/>
    <circle cx="175" cy="115" r="2"/>
  </g>
</svg>
