<svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cloudBlur" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Cloud 1 - large fluffy -->
  <g opacity="0.88" filter="url(#cloudBlur)">
    <ellipse cx="120" cy="95" rx="90" ry="35" fill="white"/>
    <ellipse cx="80" cy="80" rx="55" ry="38" fill="white"/>
    <ellipse cx="140" cy="78" rx="60" ry="42" fill="white"/>
    <ellipse cx="185" cy="88" rx="45" ry="30" fill="white"/>
  </g>
  <!-- Cloud 2 - medium, positioned right -->
  <g opacity="0.78" filter="url(#cloudBlur)">
    <ellipse cx="370" cy="115" rx="75" ry="28" fill="white"/>
    <ellipse cx="340" cy="100" rx="45" ry="32" fill="white"/>
    <ellipse cx="390" cy="98" rx="50" ry="34" fill="white"/>
    <ellipse cx="425" cy="108" rx="38" ry="24" fill="white"/>
  </g>
  <!-- Cloud 3 - small, top area -->
  <g opacity="0.6" filter="url(#cloudBlur)">
    <ellipse cx="265" cy="50" rx="55" ry="22" fill="white"/>
    <ellipse cx="245" cy="40" rx="35" ry="25" fill="white"/>
    <ellipse cx="290" cy="38" rx="40" ry="26" fill="white"/>
  </g>
</svg>
